<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Aptis Practice - Auto Check</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; padding-bottom: 80px; }
        .card { max-width: 700px; margin: auto; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .correct { background-color: #d4edda !important; color: #155724; border-color: #c3e6cb !important; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; color: #721c24; border-color: #f5c6cb !important; }
        
        #question-text { 
            font-size: 1.1rem;
            line-height: 1.5;
            min-height: 4.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .option-item { 
            transition: 0.2s; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            margin-bottom: 10px; 
            border: 1px solid #dee2e6; 
            border-radius: 8px; 
            background: #fff;
        }
        .option-item:hover { background-color: #f1f3f5; }
        
        /* Khi đã chọn thì khóa click để không chọn lại câu đó */
        .answered { pointer-events: none; }

        .option-item input[type="radio"] { 
            margin-right: 12px; 
            width: 1.2rem;
            height: 1.2rem;
            flex-shrink: 0;
        }
        
        .option-item label { cursor: pointer; margin-bottom: 0; flex-grow: 1; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 id="topic" class="m-0">Aptis Listening</h3>
            <span id="question-counter" class="badge bg-secondary p-2"></span>
        </div>
        
        <div id="question-text" class="fw-bold"></div>
        <div id="options-container"></div>
        
        <hr>
        <button class="btn btn-warning w-100 mb-2" onclick="randomQuestion()">Câu ngẫu nhiên 🎲</button>
        
        <div class="row g-2 mb-2">
            <div class="col-6">
                <button class="btn btn-outline-primary w-100" id="btn-prev" onclick="prevQuestion()">Câu trước</button>
            </div>
            <div class="col-6">
                <button class="btn btn-primary w-100" id="btn-next" onclick="nextQuestion()">Câu tiếp</button>
            </div>
        </div>
        
        <a href="index.html" class="btn btn-info w-100">Trang chủ</a>
    </div>

    <script>
        let questions = [];
        let currentIdx = 0;

        fetch('listening_question1_13.json')
            .then(res => res.json())
            .then(data => {
                questions = data;
                render();
            });

        function render() {
            if (questions.length === 0) return;
            
            const q = questions[currentIdx];
            document.getElementById('question-counter').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            document.getElementById('btn-prev').disabled = (currentIdx === 0);
            document.getElementById('btn-next').disabled = (currentIdx === questions.length - 1);

            const container = document.getElementById('options-container');
            container.innerHTML = q.options.map((opt, i) => `
                <div class="option-item" onclick="handleAutoCheck(this, '${opt}')">
                    <input type="radio" name="quiz" value="${opt}" id="opt${i}">
                    <label for="opt${i}">${opt}</label>
                </div>
            `).join('');
        }

        // Hàm xử lý tự động kiểm tra khi click
        function handleAutoCheck(element, selectedValue) {
            const q = questions[currentIdx];
            const allOptions = document.querySelectorAll('.option-item');
            
            // 1. Đánh dấu radio đã chọn
            element.querySelector('input').checked = true;

            // 2. Duyệt qua các option để hiển thị đúng/sai
            allOptions.forEach(item => {
                const val = item.querySelector('input').value;
                item.classList.add('answered'); // Khóa không cho click tiếp
                
                if (val === q.answer) {
                    item.classList.add('correct'); // Hiện màu xanh cho câu đúng
                } else if (val === selectedValue) {
                    item.classList.add('incorrect'); // Hiện màu đỏ nếu chọn sai
                }
            });
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                render();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                render();
            }
        }

        function randomQuestion() {
            let newIdx;
            do {
                newIdx = Math.floor(Math.random() * questions.length);
            } while (newIdx === currentIdx && questions.length > 1);
            currentIdx = newIdx;
            render();
        }
    </script>
</body>
</html>
