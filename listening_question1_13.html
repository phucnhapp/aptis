<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptis Practice - Smart Learning</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; padding-bottom: 80px; }
        
        .card { 
            max-width: 700px; 
            margin: auto; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            padding: 1.5rem;
        }

        @media (max-width: 767.98px) {
            body { padding: 10px; padding-bottom: 20px; background: #fff; }
            .card { 
                max-width: 100%; 
                border-radius: 10px; 
                box-shadow: none; 
                border: 1px solid #eee; 
                padding: 15px;
            }
            #topic { font-size: 1.25rem; }
        }

        .correct { background-color: #d4edda !important; color: #155724; border-color: #c3e6cb !important; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; color: #721c24; border-color: #f5c6cb !important; }
        
        #question-text { 
            font-size: 1.1rem;
            line-height: 1.5;
            min-height: 4.5rem;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .option-item { 
            transition: 0.2s; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            margin-bottom: 10px; 
            border: 1px solid #dee2e6; 
            border-radius: 8px; 
            background: #fff;
        }
        .option-item:hover { background-color: #f1f3f5; }
        .answered { pointer-events: none; }
        .option-item input[type="radio"] { 
            margin-right: 12px; 
            width: 1.2rem;
            height: 1.2rem;
            flex-shrink: 0;
        }
        .option-item label { cursor: pointer; margin-bottom: 0; flex-grow: 1; line-height: 1.4; }

        .jump-container { display: flex; align-items: center; gap: 5px; }
        #jump-input { width: 65px; text-align: center; font-weight: bold; }
        
        /* Nhãn Đã sai đỏ nhỏ */
        .badge-wrong {
            background-color: #dc3545;
            color: white;
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <div>
                <h3 id="topic" class="m-0 d-inline-block mb-2">Aptis Listening 
                    <span id="status-area"></span>
                </h3>
                <div class="mb-2">
                    <span id="correct-summary" class="badge bg-success fs-6 me-2"></span>
                    <span id="error-summary" class="badge bg-danger fs-6"></span>
                </div>
            </div>
            <div class="jump-container mt-1">
                <input type="number" id="jump-input" class="form-control form-control-sm" min="1" onchange="jumpToQuestion()">
                <span id="question-total" class="badge bg-secondary p-2"></span>
            </div>
        </div>
        
        <script src="timer.js" defer></script>
        <div class="d-flex justify-content-between align-items-center mb-1">
            <div></div>
            <div class="jump-container">
                <exam-timer minutes="30"></exam-timer>
            </div>
        </div>
        
        <div id="question-text"></div>
        <div id="options-container"></div>
        
        <hr>

        <div class="d-grid gap-2 mb-3">
            <button class="btn btn-success w-100 py-2 fw-bold" id="btn-show-answer" onclick="showCorrectAnswer()">
                Hiện đáp án ✅
            </button>
            <button class="btn btn-warning w-100 fw-bold" onclick="randomQuestion()">Câu ngẫu nhiên (Thông minh) 🎲</button>
        </div>
        
        <div class="row g-2 mb-3">
            <div class="col-6">
                <button class="btn btn-outline-primary w-100" id="btn-prev" onclick="prevQuestion()">Câu trước</button>
            </div>
            <div class="col-6">
                <button class="btn btn-primary w-100" id="btn-next" onclick="nextQuestion()">Câu tiếp</button>
            </div>
        </div>
        
        <a href="index.html" class="btn btn-light border w-100">Quay lại Trang chủ</a>
    </div>

    <script>
        let questions = [];
        let currentIdx = 0;
        let incorrectQuestions = []; // Danh sách ưu tiên để random (sẽ xóa khi chọn đúng lại)
        let hasBeenWrong = []; // Danh sách để đánh dấu "Đã sai" (không xóa)
        let hasBeenAttempted = []; // Theo dõi câu đã làm hay chưa
        let hasBeenCorrect = []; // Theo dõi câu ĐÃ TỪNG LÀM ĐÚNG (để đếm điểm không lặp)

        fetch('listening_question1_13.json')
            .then(res => res.json())
            .then(data => {
                questions = data;
                hasBeenWrong = new Array(questions.length).fill(false);
                hasBeenAttempted = new Array(questions.length).fill(false);
                hasBeenCorrect = new Array(questions.length).fill(false); // Khởi tạo mảng đếm câu đúng
                render();
            })
            .catch(err => console.error("Lỗi tải file JSON:", err));

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function updateSummaries() {
            const errorSummary = document.getElementById('error-summary');
            const correctSummary = document.getElementById('correct-summary');
            
            // Cập nhật số câu sai
            if (incorrectQuestions.length > 0) {
                errorSummary.innerText = `⚠️ SAI: ${incorrectQuestions.length}`;
            } else {
                errorSummary.innerText = "";
            }

            // Cập nhật số câu đúng (đếm các giá trị true trong mảng hasBeenCorrect)
            const correctCount = hasBeenCorrect.filter(Boolean).length;
            if (correctCount > 0) {
                correctSummary.innerText = `✅ Đúng: ${correctCount}/${questions.length}`;
            } else {
                correctSummary.innerText = "";
            }
        }

        function render() {
            if (questions.length === 0) return;
            
            const q = questions[currentIdx];
            const jumpInput = document.getElementById('jump-input');
            const statusArea = document.getElementById('status-area');
            
            jumpInput.value = currentIdx + 1;
            jumpInput.max = questions.length;
            document.getElementById('question-total').innerText = `/ ${questions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            // Cập nhật nhãn "Đã sai"
            statusArea.innerHTML = hasBeenWrong[currentIdx] ? `<span class="badge-wrong">Đã sai</span>` : "";
            
            // Cập nhật các bộ đếm
            updateSummaries();

            document.getElementById('btn-prev').disabled = (currentIdx === 0);
            document.getElementById('btn-next').disabled = (currentIdx === questions.length - 1);

            const shuffledOptions = shuffleArray(q.options);
            const container = document.getElementById('options-container');
            container.innerHTML = shuffledOptions.map((opt, i) => `
                <div class="option-item" onclick="handleAutoCheck(this, '${opt}')">
                    <input type="radio" name="quiz" value="${opt}" id="opt${i}">
                    <label for="opt${i}">${opt}</label>
                </div>
            `).join('');
            
            window.scrollTo(0, 0);
        }

        function handleAutoCheck(element, selectedValue) {
            const q = questions[currentIdx];
            const allOptions = document.querySelectorAll('.option-item');
            element.querySelector('input').checked = true;

            // Đánh dấu câu này đã được làm
            hasBeenAttempted[currentIdx] = true;

            let isCorrect = (selectedValue === q.answer);

            allOptions.forEach(item => {
                const val = item.querySelector('input').value;
                item.classList.add('answered');
                if (val === q.answer) {
                    item.classList.add('correct');
                } else if (val === selectedValue) {
                    item.classList.add('incorrect');
                }
            });

            if (isCorrect) {
                // Đánh dấu đã từng làm đúng (để đếm điểm, không bị lặp)
                hasBeenCorrect[currentIdx] = true; 
                // Xóa khỏi danh sách ưu tiên random sai
                incorrectQuestions = incorrectQuestions.filter(idx => idx !== currentIdx);
            } else {
                // Nếu chọn sai, đánh dấu "Đã sai" và thêm vào danh sách ưu tiên
                hasBeenWrong[currentIdx] = true;
                if (!incorrectQuestions.includes(currentIdx)) {
                    incorrectQuestions.push(currentIdx);
                }
                document.getElementById('status-area').innerHTML = `<span class="badge-wrong">Đã sai</span>`;
            }
            updateSummaries();
        }

        function randomQuestion() {
            if (questions.length <= 1) return;

            // Phân loại các câu hỏi (loại trừ câu hiện tại)
            let incorrectList = incorrectQuestions.filter(idx => idx !== currentIdx);
            let unattemptedList = [];
            let completedList = []; 

            for (let i = 0; i < questions.length; i++) {
                if (i === currentIdx) continue;
                
                if (!hasBeenAttempted[i]) {
                    unattemptedList.push(i);
                } else if (!incorrectQuestions.includes(i)) {
                    completedList.push(i);
                }
            }

            let nextIdx = -1;
            let r = Math.random(); 

            // Tỷ lệ: 40% Câu sai | 45% Câu chưa làm | 15% Câu đã xong
            if (r < 0.40 && incorrectList.length > 0) {
                nextIdx = incorrectList[Math.floor(Math.random() * incorrectList.length)];
            } else if (r < 0.85 && unattemptedList.length > 0) {
                nextIdx = unattemptedList[Math.floor(Math.random() * unattemptedList.length)];
            } else if (completedList.length > 0) {
                nextIdx = completedList[Math.floor(Math.random() * completedList.length)];
            }

            if (nextIdx === -1) {
                let available = [...incorrectList, ...unattemptedList, ...completedList];
                if (available.length > 0) {
                    nextIdx = available[Math.floor(Math.random() * available.length)];
                } else {
                    do {
                        nextIdx = Math.floor(Math.random() * questions.length);
                    } while (nextIdx === currentIdx);
                }
            }

            currentIdx = nextIdx;
            render();
        }

        function showCorrectAnswer() {
            // Xem đáp án cũng tính là đã tương tác nhưng KHÔNG được cộng điểm vào hasBeenCorrect
            hasBeenAttempted[currentIdx] = true; 
            
            const q = questions[currentIdx];
            const allOptions = document.querySelectorAll('.option-item');
            allOptions.forEach(item => {
                const val = item.querySelector('input').value;
                item.classList.add('answered');
                if (val === q.answer) {
                    item.classList.add('correct');
                    item.querySelector('input').checked = true;
                }
            });
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                render();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                render();
            }
        }

        function jumpToQuestion() {
            const input = document.getElementById('jump-input');
            let val = parseInt(input.value);
            if (isNaN(val) || val < 1) val = 1;
            if (val > questions.length) val = questions.length;
            currentIdx = val - 1;
            render();
        }
    </script>
</body>
</html>
