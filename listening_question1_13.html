<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptis Practice - Auto Check</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; padding-bottom: 80px; }
        
        .card { 
            max-width: 700px; 
            margin: auto; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            padding: 1.5rem;
        }

        @media (max-width: 767.98px) {
            body { padding: 10px; padding-bottom: 20px; background: #fff; }
            .card { 
                max-width: 100%; 
                border-radius: 10px; 
                box-shadow: none; 
                border: 1px solid #eee; 
                padding: 15px;
            }
            #topic { font-size: 1.25rem; }
        }

        .correct { background-color: #d4edda !important; color: #155724; border-color: #c3e6cb !important; font-weight: bold; }
        .incorrect { background-color: #f8d7da !important; color: #721c24; border-color: #f5c6cb !important; }
        
        #question-text { 
            font-size: 1.1rem;
            line-height: 1.5;
            min-height: 4.5rem;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .option-item { 
            transition: 0.2s; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            margin-bottom: 10px; 
            border: 1px solid #dee2e6; 
            border-radius: 8px; 
            background: #fff;
        }
        .option-item:hover { background-color: #f1f3f5; }
        .answered { pointer-events: none; }
        .option-item input[type="radio"] { 
            margin-right: 12px; 
            width: 1.2rem;
            height: 1.2rem;
            flex-shrink: 0;
        }
        .option-item label { cursor: pointer; margin-bottom: 0; flex-grow: 1; line-height: 1.4; }

        .jump-container { display: flex; align-items: center; gap: 5px; }
        #jump-input { width: 65px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 id="topic" class="m-0">Aptis Listening</h3>
            <div class="jump-container">
                <input type="number" id="jump-input" class="form-control form-control-sm" min="1" onchange="jumpToQuestion()">
                <span id="question-total" class="badge bg-secondary p-2"></span>
            </div>
        </div>
        
        <div id="question-text"></div>
        <div id="options-container"></div>
        
        <hr>

        <div class="d-grid gap-2 mb-3">
            <button class="btn btn-success w-100 py-2 fw-bold" id="btn-show-answer" onclick="showCorrectAnswer()">
                Hiện đáp án ✅
            </button>
            <button class="btn btn-warning w-100" onclick="randomQuestion()">Câu ngẫu nhiên 🎲</button>
        </div>
        
        <div class="row g-2 mb-3">
            <div class="col-6">
                <button class="btn btn-outline-primary w-100" id="btn-prev" onclick="prevQuestion()">Câu trước</button>
            </div>
            <div class="col-6">
                <button class="btn btn-primary w-100" id="btn-next" onclick="nextQuestion()">Câu tiếp</button>
            </div>
        </div>
        
        <a href="index.html" class="btn btn-light border w-100">Quay lại Trang chủ</a>
    </div>

    <script>
        let questions = [];
        let currentIdx = 0;

        fetch('listening_question1_13.json')
            .then(res => res.json())
            .then(data => {
                questions = data;
                render();
            })
            .catch(err => console.error("Lỗi tải file JSON:", err));

        // Thuật toán trộn mảng Fisher-Yates
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function render() {
            if (questions.length === 0) return;
            
            const q = questions[currentIdx];
            const jumpInput = document.getElementById('jump-input');
            
            jumpInput.value = currentIdx + 1;
            jumpInput.max = questions.length;
            document.getElementById('question-total').innerText = `/ ${questions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            document.getElementById('btn-prev').disabled = (currentIdx === 0);
            document.getElementById('btn-next').disabled = (currentIdx === questions.length - 1);

            // Trộn danh sách đáp án trước khi hiển thị
            const shuffledOptions = shuffleArray(q.options);

            const container = document.getElementById('options-container');
            container.innerHTML = shuffledOptions.map((opt, i) => `
                <div class="option-item" onclick="handleAutoCheck(this, '${opt}')">
                    <input type="radio" name="quiz" value="${opt}" id="opt${i}">
                    <label for="opt${i}">${opt}</label>
                </div>
            `).join('');
            
            window.scrollTo(0, 0);
        }

        function handleAutoCheck(element, selectedValue) {
            const q = questions[currentIdx];
            const allOptions = document.querySelectorAll('.option-item');
            element.querySelector('input').checked = true;

            allOptions.forEach(item => {
                const val = item.querySelector('input').value;
                item.classList.add('answered');
                if (val === q.answer) {
                    item.classList.add('correct');
                } else if (val === selectedValue) {
                    item.classList.add('incorrect');
                }
            });
        }

        function showCorrectAnswer() {
            const q = questions[currentIdx];
            const allOptions = document.querySelectorAll('.option-item');

            allOptions.forEach(item => {
                const val = item.querySelector('input').value;
                item.classList.add('answered');
                if (val === q.answer) {
                    item.classList.add('correct');
                    item.querySelector('input').checked = true;
                }
            });
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                render();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                render();
            }
        }

        function jumpToQuestion() {
            const input = document.getElementById('jump-input');
            let val = parseInt(input.value);
            if (isNaN(val) || val < 1) val = 1;
            if (val > questions.length) val = questions.length;
            currentIdx = val - 1;
            render();
        }

        function randomQuestion() {
            let newIdx;
            do {
                newIdx = Math.floor(Math.random() * questions.length);
            } while (newIdx === currentIdx && questions.length > 1);
            currentIdx = newIdx;
            render();
        }
    </script>
</body>
</html>
