<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Aptis Practice - Single Choice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding: 20px; }
        .card { max-width: 700px; margin: auto; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .correct { background-color: #d4edda !important; color: #155724; }
        .incorrect { background-color: #f8d7da !important; color: #721c24; }
    </style>
</head>
<body>
    <div class="card p-4">
        <h3 id="topic" class="mb-4">Loading...</h3>
        <div id="question-text" class="fw-bold mb-3"></div>
        <div id="options-container"></div>
        <div id="feedback" class="mt-3 fw-bold"></div>
        <hr>
        <button class="btn btn-primary" onclick="checkAnswer()">Kiểm tra</button>
        <button class="btn btn-secondary" onclick="nextQuestion()">Câu tiếp</button>
        <a href="index.html" class="btn btn-info">Trang chủ</a>
    </div>

    <script>
        let questions = [];
        let currentIdx = 0;

        fetch('listening_question1_13.json')
            .then(res => res.json())
            .then(data => { questions = data; render(); });

        function render() {
            const q = questions[currentIdx];
            document.getElementById('topic').innerText = `Câu ${currentIdx + 1}/${questions.length}`;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('feedback').innerText = "";
            
            const container = document.getElementById('options-container');
            container.innerHTML = q.options.map(opt => `
                <div class="form-check p-2 border rounded mb-2 option-item">
                    <input class="form-check-input ms-1" type="radio" name="quiz" value="${opt}" id="${opt}">
                    <label class="form-check-label ms-4" for="${opt}">${opt}</label>
                </div>
            `).join('');
        }

        function checkAnswer() {
            const q = questions[currentIdx];
            const selected = document.querySelector('input[name="quiz"]:checked')?.value;
            const items = document.querySelectorAll('.option-item');
            
            items.forEach(item => {
                const val = item.querySelector('input').value;
                if (val === q.answer) item.classList.add('correct');
                else if (val === selected) item.classList.add('incorrect');
            });
            if (selected === q.answer) document.getElementById('feedback').innerText = "✅ Chính xác!";
            else document.getElementById('feedback').innerText = `❌ Sai rồi. Đáp án đúng là: ${q.answer}`;
        }

        function nextQuestion() {
            if (currentIdx < questions.length - 1) { currentIdx++; render(); }
        }
    </script>
</body>
</html>
