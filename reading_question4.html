<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aptis Reading Part 4 - Full Features</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding: 20px; padding-bottom: 50px; font-family: 'Inter', sans-serif; }
        .card { max-width: 1000px; margin: auto; border: none; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); padding: 1.5rem; background: white; }

        /* Reading Content Section */
        .reading-box {
            background-color: #fffef0;
            padding: 15px;
            border-left: 4px solid #ffc107;
            margin-bottom: 20px;
            border-radius: 6px;
        }
        #reading-content {
            font-size: 0.95rem;
            line-height: 1.6;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            white-space: pre-line;
        }
        #reading-content.expanded { -webkit-line-clamp: unset; display: block; }
        .toggle-link { color: #007bff; cursor: pointer; font-size: 0.85rem; font-weight: 600; text-decoration: none; display: block; margin-top: 5px; }

        /* Question & Options Row */
        .q-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .q-text { flex: 1; padding-right: 20px; font-size: 0.95rem; }
        .options-group { width: 220px; display: flex; gap: 4px; }
        .opt-btn {
            flex: 1;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            background: #fff;
            transition: 0.2s;
        }
        .opt-btn:hover { background: #f8f9fa; }
        
        /* Correct/Incorrect Styles */
        .correct { background-color: #28a745 !important; color: #fff !important; border-color: #28a745 !important; }
        .incorrect { background-color: #dc3545 !important; color: #fff !important; border-color: #dc3545 !important; }
        .answered { pointer-events: none; opacity: 0.8; }

        .jump-box { display: flex; align-items: center; gap: 5px; }
        #jump-input { width: 50px; text-align: center; height: 30px; }

        @media (max-width: 768px) {
            .q-row { flex-direction: column; align-items: flex-start; }
            .options-group { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 id="topic-header" class="text-secondary fw-bold m-0">READING PRACTICE</h6>
            <div class="jump-box">
                <input type="number" id="jump-input" class="form-control form-control-sm" onchange="jump()">
                <span id="total-count" class="small text-muted"></span>
            </div>
        </div>

        <div class="reading-box">
            <div id="reading-content"></div>
            <a class="toggle-link" onclick="toggleText()" id="toggle-btn">+ Xem thêm nội dung</a>
        </div>

        <div id="questions-list"></div>

        <div class="mt-4 border-top pt-3">
            <button class="btn btn-success w-100 fw-bold mb-2" onclick="showAnswers()">HIỂN THỊ ĐÁP ÁN ✅</button>
            
            <div class="row g-2">
                <div class="col-4">
                    <button class="btn btn-outline-primary w-100 btn-sm" id="prev-btn" onclick="prev()">Trước</button>
                </div>
                <div class="col-4">
                    <button class="btn btn-warning w-100 btn-sm fw-bold" onclick="randomTopic()">Ngẫu nhiên 🎲</button>
                </div>
                <div class="col-4">
                    <button class="btn btn-primary w-100 btn-sm" id="next-btn" onclick="next()">Tiếp</button>
                </div>
                <a href="index.html" style="width: 100%" class="btn btn-info">Trang chủ</a>
            </div>
        </div>
    </div>

    <script>
        let dataList = [];
        let curIdx = 0;

        fetch('reading_question4.json')
            .then(r => r.json())
            .then(d => { dataList = d; render(); });

        function render() {
            if (!dataList.length) return;
            const item = dataList[curIdx];
            
            document.getElementById('topic-header').innerText = item.question;
            const content = document.getElementById('reading-content');
            content.innerText = item.description;
            content.classList.remove('expanded');
            document.getElementById('toggle-btn').innerText = "+ Xem thêm nội dung";
            
            document.getElementById('jump-input').value = curIdx + 1;
            document.getElementById('total-count').innerText = `/ ${dataList.length}`;

            const list = document.getElementById('questions-list');
            list.innerHTML = item.sentences.map((s, idx) => `
                <div class="q-row" id="row-${idx}">
                    <div class="q-text"><strong>${idx+1}.</strong> ${s.text}</div>
                    <div class="options-group">
                        ${s.options.map(o => `<div class="opt-btn" onclick="check(this, '${o}', '${s.answer}')">${o}</div>`).join('')}
                    </div>
                </div>
            `).join('');

            document.getElementById('prev-btn').disabled = (curIdx === 0);
            document.getElementById('next-btn').disabled = (curIdx === dataList.length - 1);
            window.scrollTo(0,0);
        }

        function toggleText() {
            const c = document.getElementById('reading-content');
            const b = document.getElementById('toggle-btn');
            const isExp = c.classList.toggle('expanded');
            b.innerText = isExp ? "- Thu gọn" : "+ Xem thêm nội dung";
        }

        function check(el, sel, ans) {
            const btns = el.parentElement.querySelectorAll('.opt-btn');
            btns.forEach(b => {
                b.classList.add('answered');
                if (b.innerText.trim() === ans) b.classList.add('correct');
                else if (b.innerText.trim() === sel) b.classList.add('incorrect');
            });
        }

        function showAnswers() {
            dataList[curIdx].sentences.forEach((s, i) => {
                const row = document.getElementById(`row-${i}`);
                row.querySelectorAll('.opt-btn').forEach(b => {
                    b.classList.add('answered');
                    if (b.innerText.trim() === s.answer) b.classList.add('correct');
                });
            });
        }

        function randomTopic() {
            let next;
            do { next = Math.floor(Math.random() * dataList.length); } while (next === curIdx && dataList.length > 1);
            curIdx = next; render();
        }

        function next() { if (curIdx < dataList.length - 1) { curIdx++; render(); } }
        function prev() { if (curIdx > 0) { curIdx--; render(); } }
        function jump() {
            let v = parseInt(document.getElementById('jump-input').value);
            if (v >= 1 && v <= dataList.length) { curIdx = v - 1; render(); }
        }
    </script>
</body>
</html>
