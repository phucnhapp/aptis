<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Aptis Practice - Dropdown</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding: 20px; }
        .container-quiz { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; }
        .q-row { margin-bottom: 20px; padding: 15px; border-bottom: 1px solid #eee; }
        .correct-sel { border: 2px solid #28a745; background-color: #d4edda; }
        .wrong-sel { border: 2px solid #dc3545; background-color: #f8d7da; }
    </style>
</head>
<body>
    <div class="container-quiz shadow">
        <h4 id="main-topic" class="text-primary"></h4>
        <div id="questions-list"></div>
        <div style="position: z; bottom:0; left:0; width:100%; background:#fff; padding:10px 0; text-align:center;">
            <button class="btn btn-success mt-4" style="width:100%;" onclick="checkAll()">Kiểm tra tất cả</button><br>
            <button class="btn btn-outline-primary mt-4" style="width:100%;" onclick="location.reload()">Làm bài khác</button><br><br>
            <a href="index.html" style="width:100%;" class="btn btn-info">Trang chủ</a>
        </div>
    </div>

    <script>
        // Thay đổi tên file JSON tại đây cho từng trang tương ứng
        const files = ['listening_question16_17.json']; 
        let activeData = [];

        fetch(files[Math.floor(Math.random()*files.length)])
            .then(res => res.json())
            .then(data => {
                const randomIndex = Math.floor(Math.random()*data.length);
                const group = data[randomIndex];
                
                // Bổ sung (Câu hiện tại/Tổng số câu)
                document.getElementById('main-topic').innerText = `(${randomIndex + 1}/${data.length}) ${group.question}`;
                
                render(group.sentences);
            });

        function render(sentences) {
            const list = document.getElementById('questions-list');
            list.innerHTML = sentences.map((s, i) => `
                <div class="q-rosw">
                    <p class="mb-2">${s.text.replace('[___]', '______')}</p>
                    <div class="d-flex align-items-center">
                        <select class="form-select w-50 user-ans" data-correct="${s.answer}">
                            <option value="">-- Chọn đáp án --</option>
                            ${s.options.map(o => `<option value="${o}">${o}</option>`).join('')}
                        </select>
                        <span class="ms-3 feedback-text fw-bold"></span>
                    </div>
                </div>
            `).join('');
        }

        function checkAll() {
            document.querySelectorAll('.user-ans').forEach(sel => {
                const isCorrect = sel.value === sel.dataset.correct;
                sel.classList.remove('correct-sel', 'wrong-sel');
                sel.classList.add(isCorrect ? 'correct-sel' : 'wrong-sel');
                sel.nextElementSibling.innerText = isCorrect ? "✅" : "❌ " + sel.dataset.correct;
            });
        }
    </script>
</body>
</html>
