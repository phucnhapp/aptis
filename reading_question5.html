<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Aptis Practice - Drag & Drop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .drag-box { border: 2px dashed #ccc; padding: 15px; border-radius: 8px; background: #fff; }
        .drag-item { padding: 12px; margin-bottom: 8px; background: #e9ecef; border: 1px solid #dee2e6; cursor: move; border-radius: 5px; transition: 0.2s; }
        .drag-item:hover { background: #dee2e6; }
        .correct-item { border: 2px solid #28a745; background: #d4edda !important; }
        .wrong-idx { color: #dc3545; font-size: 0.8rem; display: block; }
    </style>
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 rounded shadow" style="max-width: 900px;">
        <h5 id="topic-title"></h5>
        <p class="text-muted" id="desc"></p>
        <div id="drag-container" class="drag-box mb-4"></div>
        <div id="result-area"></div>

        <button class="btn btn-primary" style="width: 100%" onclick="checkOrder()">Kiểm tra thứ tự</button><br>
        <button class="btn btn-success mt-2" style="width: 100%" onclick="showCorrectOrder()">Xem kết quả</button><br>
        <button class="btn btn-secondary mt-2" style="width: 100%" onclick="location.reload()">Đổi bài</button><br><br>
        <a href="index.html" style="width: 100%" class="btn btn-info">Trang chủ</a>
    </div>

    <script>
        const files = ['reading_question5.json'];
        let correctOrder = [];

        fetch(files[Math.floor(Math.random()*files.length)])
            .then(res => res.json())
            .then(data => {
                const randomIndex = Math.floor(Math.random()*data.length);
                const item = data[randomIndex];
                
                // Bổ sung số thứ tự (Hiện tại/Tổng)
                document.getElementById('topic-title').innerText = `(${randomIndex + 1}/${data.length}) ${item.question}`;
                
                correctOrder = item.answer;
                render(item.answer);
            });

        function render(ans) {
            let shuffled = [...ans].sort(() => Math.random() - 0.5);
            const container = document.getElementById('drag-container');
            container.innerHTML = shuffled.map(text => `
                <div class="drag-item" data-val="${text}">${text}</div>
            `).join('');
            new Sortable(container, { animation: 150 });
        }

        function checkOrder() {
            const items = Array.from(document.querySelectorAll('.drag-item'));
            // Xóa thông báo lỗi cũ
            document.querySelectorAll('.wrong-idx').forEach(el => el.remove());

            let isAllCorrect = true;
            items.forEach((item, idx) => {
                if (item.dataset.val === correctOrder[idx]) {
                    item.classList.add('correct-item');
                } else {
                    isAllCorrect = false;
                    item.classList.remove('correct-item');
                    item.innerHTML += `<span class="wrong-idx">Đúng ra phải là vị trí số ${correctOrder.indexOf(item.dataset.val) + 1}</span>`;
                }
            });
        }

        // Hàm tự động sắp xếp lại theo kết quả đúng
        function showCorrectOrder() {
            const container = document.getElementById('drag-container');
            // Vẽ lại các item theo đúng thứ tự trong mảng correctOrder
            container.innerHTML = correctOrder.map(text => `
                <div class="drag-item correct-item" data-val="${text}">${text}</div>
            `).join('');
            
            // Xóa các dòng thông báo lỗi nếu có
            document.querySelectorAll('.wrong-idx').forEach(el => el.remove());
            
            // Khởi tạo lại tính năng kéo thả cho container mới
            new Sortable(container, { animation: 150 });
        }
    </script>
</body>
</html>
