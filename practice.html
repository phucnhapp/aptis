<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện tập Aptis - Chi tiết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .correct { background-color: #d4edda !important; border-color: #c3e6cb !important; }
        .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb !important; }
        .drag-item { cursor: move; padding: 10px; margin-bottom: 5px; background: #fff; border: 1px solid #ddd; border-radius: 5px; }
        #quiz-container { max-width: 800px; margin: 30px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html">← Quay lại</a>
            <span id="page-title" class="navbar-text fw-bold">Đang tải...</span>
        </div>
    </nav>

    <div id="quiz-container">
        <div id="content"></div>
        <hr>
        <div class="d-flex justify-content-between">
            <button class="btn btn-primary" onclick="checkAnswer()">Kiểm tra</button>
            <button class="btn btn-secondary" onclick="loadNextQuestion()">Câu tiếp theo</button>
        </div>
    </div>

    <script>
        // Mẫu dữ liệu giả lập từ JSON của bạn (Khi chạy thật bạn sẽ dùng fetch)
        const mockData = {
            "listening_1_13": [{ "question": "What is the speaker's job?", "options": ["Doctor", "Teacher", "Engineer"], "answer": "Teacher" }],
            "reading_1": [{ "question": "Sentence with blank", "sentences": [
                {"text": "I [___] to school every day.", "options": ["go", "gone", "goes"], "answer": "go"},
                {"text": "She [___] a book now.", "options": ["read", "is reading", "reads"], "answer": "is reading"}
            ]}],
            "drag_drop": [{ "question": "Sắp xếp đoạn hội thoại sau:", "answer": ["Hi", "How are you?", "I am fine", "Goodbye"] }]
        };

        let currentType = new URLSearchParams(window.location.search).get('type');
        let currentIdx = 0;
        let activeData = [];

        function init() {
            // Trong thực tế: fetch(`./${currentType}.json`).then(...)
            activeData = mockData[currentType] || [];
            document.getElementById('page-title').innerText = currentType.toUpperCase();
            renderQuestion();
        }

        function renderQuestion() {
            const container = document.getElementById('content');
            const data = activeData[currentIdx];
            if (!data) { container.innerHTML = "🎉 Bạn đã hoàn thành bộ câu hỏi!"; return; }

            let html = `<h5>${data.question}</h5><div class="mt-4">`;

            if (currentType === 'listening_1_13') {
                data.options.forEach(opt => {
                    html += `<div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="quiz-opt" value="${opt}" id="${opt}">
                        <label class="form-check-label" for="${opt}">${opt}</label>
                    </div>`;
                });
            } 
            else if (currentType === 'reading_1') {
                data.sentences.forEach((s, i) => {
                    html += `<div class="mb-3 p-2 border-bottom">
                        <p>${s.text}</p>
                        <select class="form-select select-quiz" data-ans="${s.answer}">
                            <option value="">-- Chọn đáp án --</option>
                            ${s.options.map(o => `<option value="${o}">${o}</option>`).join('')}
                        </select>
                        <div class="ans-feedback mt-1 small fw-bold"></div>
                    </div>`;
                });
            }
            else if (currentType === 'drag_drop') {
                let shuffled = [...data.answer].sort(() => Math.random() - 0.5);
                html += `<div id="drag-list">
                    ${shuffled.map(text => `<div class="drag-item" data-val="${text}">${text}</div>`).join('')}
                </div>
                <div id="drag-result" class="mt-3"></div>`;
                setTimeout(() => { new Sortable(document.getElementById('drag-list'), {animation: 150}); }, 100);
            }

            html += `</div>`;
            container.innerHTML = html;
        }

        function checkAnswer() {
            const data = activeData[currentIdx];
            
            if (currentType === 'listening_1_13') {
                const selected = document.querySelector('input[name="quiz-opt"]:checked')?.value;
                const labels = document.querySelectorAll('.form-check-label');
                labels.forEach(l => {
                    if(l.innerText === data.answer) l.parentElement.classList.add('correct');
                    else if(l.innerText === selected) l.parentElement.classList.add('incorrect');
                });
            }
            else if (currentType === 'reading_1') {
                document.querySelectorAll('.select-quiz').forEach(sel => {
                    const feedback = sel.nextElementSibling;
                    if (sel.value === sel.dataset.ans) {
                        sel.classList.add('correct');
                        feedback.innerHTML = "✅ Đúng!";
                    } else {
                        sel.classList.add('incorrect');
                        feedback.innerHTML = `❌ Sai. Đáp án: ${sel.dataset.ans}`;
                    }
                });
            }
            else if (currentType === 'drag_drop') {
                const items = Array.from(document.querySelectorAll('.drag-item'));
                const userOrder = items.map(i => i.dataset.val);
                const isCorrect = JSON.stringify(userOrder) === JSON.stringify(data.answer);
                
                const resultDiv = document.getElementById('drag-result');
                if (isCorrect) {
                    resultDiv.innerHTML = "<div class='alert alert-success'>Chính xác!</div>";
                    items.forEach(i => i.classList.add('correct'));
                } else {
                    let correctHTML = "<h6>Thứ tự đúng:</h6><ol>";
                    data.answer.forEach(a => correctHTML += `<li>${a}</li>`);
                    correctHTML += "</ol>";
                    resultDiv.innerHTML = `<div class='alert alert-danger'>${correctHTML}</div>`;
                }
            }
        }

        function loadNextQuestion() {
            currentIdx++;
            renderQuestion();
        }

        init();
    </script>
</body>
</html>
